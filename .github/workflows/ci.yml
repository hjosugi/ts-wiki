name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: Install, typecheck, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build web
        run: bun run build

      - name: Install Chromium
        run: bunx playwright install chromium --with-deps

      - name: Browser smoke test
        run: bun run test:e2e

      - name: Dependency audit
        run: bun audit --production

  container:
    name: Build and smoke-test container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build image
        run: docker build -t kawaii-wiki-ci .

      - name: Start image
        run: |
          docker run -d --name kawaii-wiki-ci -p 4000:4000 \
            -v kawaii-wiki-ci-data:/data \
            kawaii-wiki-ci

      - name: Smoke health and setup
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4000/api/health >/dev/null; then break; fi
            if [ "$attempt" = 30 ]; then docker logs kawaii-wiki-ci; exit 1; fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:4000/api/setup/status | grep 'needsSetup'

      - name: Show logs on failure
        if: failure()
        run: docker logs kawaii-wiki-ci

      - name: Stop image
        if: always()
        run: |
          docker rm -f kawaii-wiki-ci || true
          docker volume rm kawaii-wiki-ci-data || true

  external-database-contract:
    name: Provision and test external libSQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Provision external database and run contracts
        run: bash scripts/test-external-database.sh

  postgres-contract:
    name: Provision and test PostgreSQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: wiki
          POSTGRES_PASSWORD: wiki
          POSTGRES_DB: wiki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U wiki -d wiki"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run PostgreSQL contract
        env:
          KAWAII_WIKI_TEST_POSTGRES_URL: postgres://wiki:wiki@127.0.0.1:5432/wiki
        run: bun test apps/server/src/db/postgres

  mysql-contract:
    name: Provision and test MySQL
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: wiki
          MYSQL_DATABASE: wiki
          MYSQL_USER: wiki
          MYSQL_PASSWORD: wiki
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u wiki -pwiki --silent"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 40

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run MySQL contract
        env:
          KAWAII_WIKI_TEST_MYSQL_URL: mysql://wiki:wiki@127.0.0.1:3306/wiki
        run: bun test apps/server/src/db/mysql
