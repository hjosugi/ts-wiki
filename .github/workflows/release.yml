name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Publish Docker image and GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build smoke image
        run: docker build -t kawaii-wiki-release-smoke .

      - name: Smoke release image
        run: |
          docker run -d --name kawaii-wiki-release-smoke -p 4000:4000 \
            -e JWT_SECRET=release-smoke-secret-with-more-than-32-characters \
            kawaii-wiki-release-smoke
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4000/api/health >/dev/null; then break; fi
            if [ "$attempt" = 30 ]; then docker logs kawaii-wiki-release-smoke; exit 1; fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:4000/api/setup/status | grep 'needsSetup'
          docker rm -f kawaii-wiki-release-smoke

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "$GITHUB_REF_NAME" || gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
