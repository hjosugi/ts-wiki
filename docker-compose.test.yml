# Local integration backends for driver contract tests.
#
#   docker compose -f docker-compose.test.yml up -d --wait postgres
#   KAWAII_WIKI_TEST_POSTGRES_URL=postgres://wiki:wiki@127.0.0.1:15432/wiki \
#     bun test apps/server/src/db/postgres
#   docker compose -f docker-compose.test.yml down -v
#
# scripts/test-postgres.sh / scripts/test-mysql.sh wrap this. CI uses service
# containers instead.
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: wiki
      POSTGRES_DB: wiki
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      # Force TCP (-h): during init the official image runs a socket-only temp
      # server, so a socket pg_isready can report healthy before the real TCP
      # listener is up. Checking 127.0.0.1 only passes once TCP is serving.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U wiki -d wiki"]
      interval: 1s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: wiki
      MYSQL_DATABASE: wiki
      MYSQL_USER: wiki
      MYSQL_PASSWORD: wiki
    ports:
      - "127.0.0.1:13306:3306"
    healthcheck:
      # -h 127.0.0.1 for the same TCP-vs-socket reason as postgres above.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u wiki -pwiki --silent"]
      interval: 2s
      timeout: 3s
      retries: 40
